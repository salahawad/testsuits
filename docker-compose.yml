services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-testsuits}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-testsuits}
      POSTGRES_DB: ${POSTGRES_DB:-testsuits}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-testsuits}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_HOST_PORT:-9004}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9005}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb -p local/${MINIO_BUCKET:-testsuits} || true;
      mc anonymous set download local/${MINIO_BUCKET:-testsuits} || true;
      exit 0;
      "

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://testsuits:testsuits@db:5432/testsuits?schema=public}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: ${API_PORT:-4000}
      NODE_ENV: development
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9004}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${MINIO_BUCKET:-testsuits}
      S3_REGION: us-east-1
      JIRA_BASE_URL: ${JIRA_BASE_URL:-}
      JIRA_USER: ${JIRA_USER:-}
      JIRA_TOKEN: ${JIRA_TOKEN:-}
      JIRA_PROJECT_KEY: ${JIRA_PROJECT_KEY:-HAP}
      SMTP_URL: ${SMTP_URL:-smtp://mailpit:1025}
      MAIL_FROM: ${MAIL_FROM:-TestSuits <no-reply@testsuits.local>}
      APP_URL: ${APP_URL:-http://localhost:5173}
      GMAIL_USER: ${GMAIL_USER:-}
      GMAIL_PASSWORD: ${GMAIL_PASSWORD:-}
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
      mailpit:
        condition: service_started
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    command: sh -c "npx prisma db push --accept-data-loss && npx prisma db seed && npm run dev"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      - api
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html

volumes:
  postgres-data:
  minio-data:
