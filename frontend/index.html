<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3b54d9" />
    <meta name="description" content="TestSuits — self-hosted test management for manual QA." />
    <title>TestSuits — Modern Test Management</title>
    <script>
      // Pre-hydration: if the user previously chose dark, set the class before
      // React paints so they don't see a flash of the light theme. Default is
      // light — no prefers-color-scheme sniffing.
      (function () {
        try {
          if (localStorage.getItem("ts_theme") === "dark") {
            document.documentElement.classList.add("dark");
            document.documentElement.style.colorScheme = "dark";
          }
        } catch (e) { /* localStorage blocked — fall through to light */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
